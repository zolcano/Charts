    group: "database connection strings"

  - variable: dbConnections.values.postal
    label: "postal database connection string"
    type: string
    required: true
    group: "database connection strings"
  
  - variable: dbConnections.values.scheduler
    label: "scheduler database connection string"
    type: string
    required: true
    group: "database connection strings"

  - variable: dbConnections.values.signature
    label: "signature database connection string"
    type: string
    required: true
