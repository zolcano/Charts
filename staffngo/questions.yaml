categories:
  - staffngo

questions:
  # ── Déploiement ────────────────────────────────────────────────
  - variable: namespace
    label: "Namespace Kubernetes"
    description: "Namespace dans lequel tous les microservices seront déployés."
    type: string
    default: "staffngo"
    required: true
    group: "Déploiement"

  - variable: environment
    label: "Environnement Applicatif"
    description: "Environnement dans lequel tous les microservices seront déployés."
    type: string
    default: production"
    required: true
    group: "Déploiement"

  # ── Registry ─────────────────────────────────────────────────
  - variable: registry.server
    label: "Serveur du registry Docker"
    description: "URL de l'Azure Container Registry."
    type: string
    default: "staffngoacr.azurecr.io"
    required: true
    group: "Registry"

  - variable: acrSecret.username
    label: "Nom d'utilisateur ACR"
    description: "Service principal ou nom d'utilisateur pour s'authentifier au registry."
    type: string
    default: "staffngoacr"
    required: true
    group: "Registry"

  - variable: acrSecret.password
    label: "Mot de passe ACR"
    description: "Mot de passe ou secret du registry."
    type: password
    required: true
    group: "Registry"

  # ── Digidoc ──────────────────────────────────────────────────
  - variable: services.digidoc.enabled
    label: "deploy ?"
    type: bool
    default: true
    group: "digidoc"

  - variable: services.digidoc.image
    label: "digidoc - image name"
    type: string
    default: "demo-digidoc.api"
    group: "digidoc"

  - variable: services.digidoc.tag
    label: "digidoc - tag image"
    type: string
    default: "20260324.1915"
    group: "digidoc"

  - variable: services.digidoc.replicaCount
    label: "digidoc - replicas"
    type: int
    default: 1
    group: "digidoc"

  # ── External ──────────────────────────────────────────────────
  - variable: services.external.enabled
    label: "deploy ?"
    type: bool
    default: true
    group: "external"

  - variable: services.external.image
    label: "external - image name"
    type: string
    default: "demo-external.api"
    group: "external"

  - variable: services.external.tag
    label: "external - tag image"
    type: string
    default: "20260331.1610"
    group: "external"

  - variable: services.external.replicaCount
    label: "external - replicas"
    type: int
    default: 1
    group: "external"

  # ── Identity ──────────────────────────────────────────────────
  - variable: services.identity.enabled
    label: "deploy ?"
    type: bool
    default: true
    group: "identity"

  - variable: services.identity.image
    label: "identity - image name"
    type: string
    default: "demo-identity.api"
    group: "identity"

  - variable: services.identity.tag
    label: "identity - tag image"
    type: string
    default: "20260324.1919"
    group: "identity"

  - variable: services.identity.replicaCount
    label: "identity - replicas"
    type: int
    default: 1
    group: "identity"

  - variable: services.identity.env.AZURE_CLIENT_ID
    label: "environment var - azure client id"
    type: string
    default: ""
    group: "identity"

  - variable: services.identity.env.REDIS_CONNECTION_STRING
    label: "environment var - redis connection string"
    type: string
    group: "identity"

  - variable: services.identity.env.AZURE_TENANT_ID
    label: "environment var - azure tenant id"
    type: string
    default: ""
    group: "identity"
  
  - variable: services.identity.env.AZURE_CLIENT_SECRET
    label: "environment var - azure client secret"
    type: string
