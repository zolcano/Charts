categories:
  - Staffngo

questions:
  # DÉPLOIEMENT -------------------------------------------------------------

  - variable: namespace
    label: "Namespace"
    description: "Namespace Kubernetes pour le déploiement."
    type: string
    default: "staffngo"
    required: true
    group: "Déploiement"

  - variable: environment
    label: "Environnement"
    description: "Environnement applicatif (dev, staging, production)."
    type: string
    default: "Demo"
    required: true
    group: "Déploiement"

  # REGISTRY ---------------------------------------------------------
  - variable: registry.server
    label: "Registry Docker"
    description: "URL de l'Azure Container Registry."
    type: string
    default: "staffngoacr.azurecr.io"
    required: true
    group: "Registry"

  - variable: acrSecret.username
    label: "ACR - Username"
    type: string
    default: "staffngoacr"
    required: true
    group: "Registry"

  - variable: acrSecret.password
    label: "ACR - Password"
    type: password
    required: true
    group: "Registry"

  # SERVICES ----------------------------------------------------------------
  # ---------------- REDIS-CLUSTER ----------

  - variable: services.redis.enabled
    label: "Déployer ?"
    type: bool
    default: true
    group: "Redis Cluster"

  - variable: services.redis.tag
    label: "Tag"
    type: string
    default: "8.6"
    group: "Redis Cluster"

  - variable: services.redis.replicaCount
    label: "nombre de noeud total redis"
    description: "3 (3masters); 6 (3masters+3replicas)"
    type: int
    default: 3
    group: "Redis Cluster"

  - variable: services.redis.clusterReplicas
    label: "nombre de replicas par master"
    description: "3 (3masters); 6 (3masters+3replicas)"
    type: int
    default: 0
    group: "Redis Cluster"
  
  - variable: services.redis.storageClassName
    label: "type de disque attachés"
    type: string
    default: "managed-csi"
    group: "Redis Cluster"

  - variable: services.redis.storage
    label: "quantité de stockage"
    type: string
    default: "5Gi"
    group: "Redis Cluster"

  # ---------------- DIGIDOC ----------------
  - variable: services.digidoc.enabled
    label: "Déployer ?"
    type: bool
    default: true
    group: "Digidoc"

  - variable: services.digidoc.image
    label: "Image"
    type: string
    default: "demo-digidoc.api"
    group: "Digidoc"

  - variable: services.digidoc.tag
    label: "Tag"
    type: string
    default: "20260324.1915"
    group: "Digidoc"

  - variable: services.digidoc.replicaCount
    label: "Réplicas"
    type: int
    default: 1
    group: "Digidoc"

