  # ── common secrets ────────────────────────────────────────────
  - variable: secret.secretValues.API_BASE_URL
    label: "fqdn de résolution vers l'API"
    type: string
    default: "https://api.staffngo.com"
    required: true
    group: "secret"

  - variable: secret.secretValues.AZURE_SERVICEBUS_CONNECTION_STRING
    label: "azure servicebus connection string"
    description: "azurePortal > namespace > servicebus > settings > SharedAccessPolicy > ConnexionString"
    type: string
    required: true
    group: "secret"

  - variable: secret.secretValues.AZURE_STORAGE_CONNECTION_STRING
    label: "azure storage connection string :"
    description: "azurePortal > namespace > (blob)storage > security > accessKeys > ConnexionString"
    type: string
    required: true
    group: "secret"

  - variable: secret.secretValues.SYNCFUSION_LISENCE
    label: "liscence syncfusion"
    type: string
