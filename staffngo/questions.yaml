categories:
  - staffngo

questions:
  # ── Namespace ────────────────────────────────────────────────
  - variable: namespace
    label: "Namespace Kubernetes"
    description: "Namespace dans lequel tous les microservices seront déployés."
    type: string
    default: "staffngo"
    required: true
    group: "Déploiement"

  - variable: environment
    label: "environment"
    description: "Aspnetcore environment"
    type: string
    default: Production"
    required: true
    group: "Déploiement"

  # ── Registry ─────────────────────────────────────────────────
  - variable: registry.server
    label: "Serveur du registry Docker"
    description: "URL de l'Azure Container Registry."
    type: string
    default: "staffngoacr.azurecr.io"
    required: true
    group: "Registry"

  - variable: secret.username
    label: "Nom d'utilisateur ACR"
    description: "Service principal ou nom d'utilisateur pour s'authentifier au registry."
    type: string
    default: "staffngoacr"
    required: true
    group: "Registry"

  - variable: secret.password
    label: "Mot de passe ACR"
    description: "Mot de passe ou secret du registry."
    type: password
    required: true
    group: "Registry"

  # ── Versions des microservices ────────────────────────────────
  - variable: services.digidoc.tag
    label: "digidoc — tag image"
    type: string
    default: "20260324.1915"
    group: "Versions des images"

  - variable: services.external.tag
    label: "external — tag image"
    type: string
    default: "20260331.1610"
    group: "Versions des images"

  - variable: services.identity.tag
    label: "identity — tag image"
    type: string
    default: "20260324.1919"
    group: "Versions des images"

  - variable: services.laborregister.tag
    label: "laborregister — tag image"
    type: string
    default: "20260324.1905"
    group: "Versions des images"

  - variable: services.monitoring.tag
    label: "monitoring — tag image"
    type: string
    default: "20251006.2114"
    group: "Versions des images"

  - variable: services.notification.tag
    label: "notification — tag image"
    type: string
    default: "20260324.1910"
    group: "Versions des images"

  - variable: services.postal.tag
    label: "postal — tag image"
    type: string
    default: "20260302.0955"
    group: "Versions des images"

  - variable: services.scheduler.tag
    label: "scheduler — tag image"
    type: string
    default: "20260302.0754"
    group: "Versions des images"

  - variable: services.signature.tag
    label: "signature — tag image"
    type: string
    default: "20260217.1734"
    group: "Versions des images"

  - variable: services.staffngo.tag
    label: "staffngo — tag image"
    type: string
    default: "20260331.1614"
    group: "Versions des images"

  - variable: services.subscription.tag
    label: "subscription — tag image"
    type: string
    default: "20260302.0946"
    group: "Versions des images"

  - variable: services.vault.tag
    label: "vault — tag image"
    type: string
    default: "20260217.1605"
    group: "Versions des images"

  # ── Ressources par défaut ─────────────────────────────────────
  - variable: defaults.replicaCount
    label: "Nombre de réplicas par défaut"
    type: int
    default: 1
    min: 1
    max: 10
    group: "Ressources"

  # ── common secrets ────────────────────────────────────────────

  - variable: common.secretValues.API_BASE_URL
    label: "fqdn de résolution vers l'API"
    type: string
    default: "https://api.staffngo.com"
    required: true
    group: "Common secret"

  - variable: common.secretValues.ASPNETCORE_ENVIRONMENT
    label: "environnement de déploiement"
    type: string
    default: "Production"
    required: true
    group: "Common secret"

  - variable: common.secretValues.AZURE_SERVICEBUS_CONNECTION_STRING
    label: "azure servicebus connection string"
    description: "azurePortal > namespace > servicebus > settings > SharedAccessPolicy > ConnexionString"
    type: string
    required: true
    group: "Common secret"

  - variable: common.secretValues.AZURE_STORAGE_CONNECTION_STRING
    label: "azure storage connection string :"
    description: "azurePortal > namespace > (blob)storage > security > accessKeys > ConnexionString"
    type: string
    required: true
    group: "Common secret"

  - variable: common.secretValues.SYNCFUSION_LISENCE
    label: "liscence syncfusion"
    type: string
    required: true
    group: "Common secret"

  #  ── database connection strings ───────────────────────────────

  - variable: dbConnections.values.digidoc
    label: "digidoc database connection string"
    type: string
    required: true
    group: "database connection strings"

  - variable: dbConnections.values.external
    label: "external database connection string"
    type: string
    required: true
