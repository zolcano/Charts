{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $name }}
    chart: {{ $.Chart.Name }}-{{ $.Chart.Version }}
spec:
  replicas: {{ $svc.replicaCount }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      imagePullSecrets:
        - name: {{ $.Values.registry.secretName }}
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.registry.server }}/{{ $svc.image }}:{{ $svc.tag }}"
          imagePullPolicy: {{ default $.Values.defaults.pullPolicy $svc.pullPolicy }}
          ports:
            - containerPort: {{ default $.Values.defaults.port $svc.port }}
          envFrom:
            - secretRef:
                name: {{ $.Values.secret.name }}
          {{- if or $svc.env $svc.configKeys }}
          env:
            {{- if $svc.env }}
            {{- range $key, $value := $svc.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            {{- if $svc.configKeys }}
            {{- range $svc.configKeys }}
            - name: {{ .envVar }}
              valueFrom:
                configMapKeyRef:
                  name: {{ $.Values.configMap.name }}
                  key: {{ .configMapKey }}
            {{- end }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml ($svc.resources) | nindent 12 }}
{{- end }}
{{- end }}