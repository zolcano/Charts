    tag: "20260331.1614"
    replicaCount: 1
    pullPolicy: "IfNotPresent"
    service:
      type: "ClusterIP"
      port: 80
    resources:
      requests:
        cpu: "250m"
        memory: "2048Mi"
      limits:
        cpu: "500m"
        memory: "4096Mi"
    env:
      API_BASE_PATH: "staffngo"
      ENABLE_INSTALLERS: "true"
      OODRIVE_TOKEN: ""
      REDIS_CONNECTION_STRING: ""
      UBIQOD_API_KEY: ""
      REDIS_WS_CONNECTION_STRING: ""
